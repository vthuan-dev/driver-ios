name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.35.1'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      
    - name: Run tests
      run: flutter test
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Build iOS (no signing)
      run: |
        flutter build ios --release --no-codesign
        
    - name: Create IPA directory
      run: mkdir -p build/ios/ipa
      
    - name: Create IPA
      run: |
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r ../ipa/driver_app.ipa Payload/
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: driver-app-ios
        path: build/ios/ipa/driver_app.ipa
        retention-days: 30
        
    - name: Upload to TestFlight (if secrets available)
      if: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      run: |
        # Install fastlane
        sudo gem install fastlane
        
        # Create fastlane config
        mkdir -p ios/fastlane
        cat > ios/fastlane/Fastfile << EOF
        default_platform(:ios)
        
        platform :ios do
          desc "Upload to TestFlight"
          lane :beta do
            upload_to_testflight(
              ipa: "../build/ios/ipa/driver_app.ipa",
              skip_waiting_for_build_processing: true
            )
          end
        end
        EOF
        
        # Upload to TestFlight
        cd ios && fastlane beta